
{% extends 'index.html' %}
{% load static %}

{% block content %}
    <link rel="stylesheet" href="{% static 'auth.css' %}">

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Sign In</h2>
        <form method="post" class="auth-form">
            {% csrf_token %}
            
            {{ login_form.as_p }}
            
            <button type="submit" class="auth-btn">Sign In</button>
        </form>
        
        <p class="auth-footer">
            New to AWS? <a href="{% url 'signup' %}">Create an account</a>
        </p>
    </div>
</div>
{% endblock %}
